name: Deploy myMadBooks to GitHub Pages

on:
  workflow_dispatch:   # Manuel tetikleme: Actions → Deploy myMadBooks → Run workflow
  push:
    branches: [main]
    paths:
      - 'rust-guide-mdbook/**'
      - 'os-history-mdbook/**'
      - 'pages/**'
      - 'assets/**'
      - '.github/workflows/deploy-rust-guide.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          tag=$(curl -sSfL 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' | jq -r '.tag_name')
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir mdbook
          curl -sSL "$url" | tar -xz -C mdbook
          echo "$(pwd)/mdbook" >> $GITHUB_PATH

      - name: Build Rust Guide
        run: |
          cd rust-guide-mdbook
          mdbook build

      - name: Build OS History
        run: |
          cd os-history-mdbook
          mdbook build

      - name: Prepare site
        run: |
          mkdir -p _site
          cp pages/index.html _site/
          cp -r rust-guide-mdbook/book _site/rust-guide-book
          cp -r os-history-mdbook/book _site/os-history-book
          mkdir -p _site/assets/images
          cp -r assets/images/* _site/assets/images/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
