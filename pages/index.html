<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myMadBooks — Technical Books & Guides</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 4rem auto; padding: 1rem; line-height: 1.6; color: #333; }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; font-size: 1rem; margin-bottom: 2rem; }
    .book-list { list-style: none; padding: 0; margin: 0; }
    .book-list li { margin-bottom: 1rem; }
    .book-list a { display: block; padding: 1rem; background: #f6f8fa; border-radius: 8px; text-decoration: none; color: #0969da; font-weight: 500; border: 1px solid #eaeef2; transition: background .2s; }
    .book-list a:hover { background: #eaeef2; }
    .book-list .desc { display: block; font-size: 0.875rem; color: #656d76; margin-top: 0.25rem; font-weight: 400; }
  </style>
</head>
<body>
  <h1>📚 myMadBooks</h1>
  <p class="subtitle">Technical books & documentation — built with mdBook</p>
  <ul class="book-list">
    <li>
      <a href="rust-guide-book/">🦀 Rust Developer Guide</a>
      <span class="desc">Learning Rust from zero to systems engineer. 35+ week roadmap, ecosystem reference.</span>
    </li>
  </ul>
</body>
</html>
